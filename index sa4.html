<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake — Fruit Edition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0d0d14;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Mono',monospace;color:#e2e8f0}
  #layout{display:flex;gap:16px;align-items:flex-start;justify-content:center;padding:24px}
  .panel{width:140px;flex-shrink:0}
  #game-wrap{display:flex;flex-direction:column;align-items:center;gap:12px}
  #canvas{border:1.5px solid #334155;border-radius:8px;display:block;background:#0a0a0f;cursor:none}
  .panel-card{background:#161622;border:0.5px solid #2a2a3e;border-radius:12px;padding:14px 10px;margin-bottom:10px}
  .panel-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:#64748b;margin-bottom:6px;font-family:'Syne',sans-serif}
  .score-val{font-size:28px;font-weight:700;color:#e2e8f0;line-height:1}
  .fruit-display{font-size:28px;text-align:center;line-height:1.2}
  .fruit-name{font-size:10px;color:#94a3b8;text-align:center;margin-top:4px;font-family:'Syne',sans-serif}
  .hiscore-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:0.5px solid #1e293b;font-size:11px}
  .hiscore-row:last-child{border-bottom:none}
  .hiscore-rank{color:#475569;font-size:10px}
  .hiscore-score{font-weight:700;color:#e2e8f0}
  #status{font-family:'Syne',sans-serif;font-size:13px;color:#64748b;letter-spacing:0.05em;text-align:center}
  #start-btn{font-family:'Space Mono',monospace;font-size:12px;padding:10px 24px;border:1.5px solid #334155;border-radius:6px;background:transparent;color:#e2e8f0;cursor:pointer;letter-spacing:0.08em;transition:background .15s}
  #start-btn:hover{background:#161622}
  .streak-badge{font-size:10px;color:#f59e0b;letter-spacing:0.05em;height:18px;text-align:center;font-family:'Syne',sans-serif}
  .next-label{font-size:10px;color:#475569;text-align:center;font-family:'Syne',sans-serif;margin-top:8px;margin-bottom:3px;letter-spacing:0.08em;text-transform:uppercase}
  .next-fruit{font-size:20px;text-align:center}
  h1{font-family:'Syne',sans-serif;font-size:13px;letter-spacing:0.15em;color:#2dd4bf;text-align:center;text-transform:uppercase;margin-bottom:4px}
  .legend{display:flex;gap:14px;font-size:10px;color:#475569;font-family:'Syne',sans-serif;justify-content:center}
  .legend span{display:flex;align-items:center;gap:5px}
  .legend-dot{width:10px;height:10px;border-radius:2px;display:inline-block}
  #level-disp{font-size:11px;color:#2dd4bf;font-family:'Syne',sans-serif;text-align:center;letter-spacing:0.1em}
</style>
</head>
<body>
<div id="layout">
  <div class="panel">
    <div class="panel-card">
      <div class="panel-label">Score</div>
      <div class="score-val" id="score-disp">0</div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Current fruit</div>
      <div class="fruit-display" id="fruit-emoji">🍎</div>
      <div class="fruit-name" id="fruit-name">Apple</div>
    </div>
    <div class="panel-card" style="text-align:center">
      <div class="next-label">Next up</div>
      <div class="next-fruit" id="next-fruit-emoji">🍊</div>
      <div class="streak-badge" id="streak-disp"></div>
    </div>
    <div class="panel-card" style="text-align:center">
      <div class="panel-label">Lives</div>
      <div id="lives-disp" style="font-size:20px;letter-spacing:4px">❤️❤️❤️</div>
    </div>
  </div>

  <div id="game-wrap">
    <h1>🐍 Snake — Fruit Edition</h1>
    <div id="level-disp">LEVEL 1</div>
    <canvas id="canvas" width="320" height="320"></canvas>
    <div class="legend">
      <span><span class="legend-dot" style="background:#ef4444"></span>bomb</span>
      <span><span class="legend-dot" style="background:#f59e0b"></span>spike</span>
      <span><span class="legend-dot" style="background:#8b5cf6"></span>wall</span>
    </div>
    <div id="status">press start to play</div>
    <button id="start-btn">▶ START</button>
  </div>

  <div class="panel">
    <div class="panel-card">
      <div class="panel-label">High Scores</div>
      <div id="hiscore-list">
        <div class="hiscore-row"><span class="hiscore-rank">#1</span><span class="hiscore-score">—</span></div>
        <div class="hiscore-row"><span class="hiscore-rank">#2</span><span class="hiscore-score">—</span></div>
        <div class="hiscore-row"><span class="hiscore-rank">#3</span><span class="hiscore-score">—</span></div>
        <div class="hiscore-row"><span class="hiscore-rank">#4</span><span class="hiscore-score">—</span></div>
        <div class="hiscore-row"><span class="hiscore-rank">#5</span><span class="hiscore-score">—</span></div>
      </div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Best streak</div>
      <div class="score-val" id="best-streak">0</div>
      <div style="font-size:10px;color:#475569;margin-top:4px;font-family:'Syne',sans-serif">fruits in a row</div>
    </div>
    <div class="panel-card">
      <div class="panel-label">Fruits eaten</div>
      <div class="score-val" id="total-eaten">0</div>
    </div>
  </div>
</div>

<script>
const FRUITS=[
  {e:'🍎',n:'Apple',pts:10},{e:'🍊',n:'Orange',pts:15},{e:'🍋',n:'Lemon',pts:20},
  {e:'🍇',n:'Grapes',pts:25},{e:'🍓',n:'Strawberry',pts:30},{e:'🍉',n:'Watermelon',pts:35},
  {e:'🍑',n:'Peach',pts:40},{e:'🍍',n:'Pineapple',pts:50},{e:'🥝',n:'Kiwi',pts:60},
  {e:'🫐',n:'Blueberry',pts:75},{e:'🍒',n:'Cherry',pts:90},{e:'🥭',n:'Mango',pts:100},
  {e:'🍈',n:'Melon',pts:120},{e:'🫒',n:'Olive',pts:150},{e:'🍌',n:'Banana',pts:80},
];

// Hazard types
const HAZARD_TYPES = {
  BOMB:  { emoji:'💣', color:'#ef4444', bg:'#3f0f0f', label:'bomb',  pulse:true  },
  SPIKE: { emoji:'🪤', color:'#f59e0b', bg:'#3f2a00', label:'spike', pulse:false },
  WALL:  { emoji:'🧱', color:'#8b5cf6', bg:'#1e1040', label:'wall',  pulse:false },
};

const GRID=16, CELL=20, W=320, H=320;
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');

let snake,dir,nextDir,fruit,fruitIdx,nextFruitIdx;
let score,running,loop,streak,bestStreak,totalEaten,lives,level;
let hazards=[], particles=[], flashTimer=0, flashColor='';
let fruitCanvasEl=null;
let hiScores=[];
try{ hiScores=JSON.parse(localStorage.getItem('snakeHiScores2')||'[]'); }catch(e){}

// ─── Particles ───────────────────────────────────────────────
function spawnParticles(x,y,color,count=8){
  for(let i=0;i<count;i++){
    let angle=Math.random()*Math.PI*2;
    let speed=1+Math.random()*3;
    particles.push({
      x:x*CELL+CELL/2, y:y*CELL+CELL/2,
      vx:Math.cos(angle)*speed, vy:Math.sin(angle)*speed,
      alpha:1, color, r:3+Math.random()*3, life:0, maxLife:18+Math.random()*12
    });
  }
}

function updateParticles(){
  particles=particles.filter(p=>{
    p.life++;p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;
    p.alpha=1-p.life/p.maxLife;
    return p.life<p.maxLife;
  });
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.alpha;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

// ─── Hazard management ───────────────────────────────────────
function isFree(x,y){
  if(snake.some(s=>s.x===x&&s.y===y)) return false;
  if(fruit&&fruit.x===x&&fruit.y===y) return false;
  if(hazards.some(h=>h.x===x&&h.y===y)) return false;
  return true;
}

function spawnHazards(){
  hazards=[];
  let types=Object.keys(HAZARD_TYPES);
  // scale count with level: 2 at level 1, +1 per level, cap 10
  let count = Math.min(2 + (level-1), 10);
  let attempts=0;
  while(hazards.length<count && attempts<200){
    attempts++;
    let x=Math.floor(Math.random()*GRID), y=Math.floor(Math.random()*GRID);
    // keep centre clear at start
    if(Math.abs(x-8)<=2&&Math.abs(y-8)<=2) continue;
    if(!isFree(x,y)) continue;
    let type=types[Math.floor(Math.random()*types.length)];
    // walls can be 2-cells long
    if(type==='WALL'&&Math.random()>0.5){
      let horiz=Math.random()>0.5;
      let x2=horiz?x+1:x, y2=horiz?y:y+1;
      if(x2<GRID&&y2<GRID&&isFree(x2,y2)){
        hazards.push({type,x,y});
        hazards.push({type,x:x2,y:y2});
        continue;
      }
    }
    hazards.push({type,x,y});
  }
}

// emoji pre-render cache
const emojiCache={};
function getEmojiCanvas(emoji){
  if(emojiCache[emoji]) return emojiCache[emoji];
  let c=document.createElement('canvas'); c.width=CELL; c.height=CELL;
  let fc=c.getContext('2d');
  fc.font=`${CELL-4}px serif`; fc.textAlign='center'; fc.textBaseline='middle';
  fc.fillText(emoji,CELL/2,CELL/2+1);
  emojiCache[emoji]=c; return c;
}

function placeFruit(){
  let pos;let att=0;
  do{ pos={x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)};att++; }
  while(!isFree(pos.x,pos.y)&&att<300);
  fruit=pos;
}

// ─── UI ──────────────────────────────────────────────────────
function updateUI(){
  document.getElementById('score-disp').textContent=score;
  document.getElementById('fruit-emoji').textContent=FRUITS[fruitIdx].e;
  document.getElementById('fruit-name').textContent=FRUITS[fruitIdx].n;
  document.getElementById('next-fruit-emoji').textContent=FRUITS[nextFruitIdx].e;
  document.getElementById('total-eaten').textContent=totalEaten;
  document.getElementById('best-streak').textContent=Math.max(bestStreak||0,streak);
  let sd=document.getElementById('streak-disp');
  sd.textContent=streak>=2?`🔥 ${streak} streak`:'';
  document.getElementById('lives-disp').textContent='❤️'.repeat(lives)+'🖤'.repeat(Math.max(0,3-lives));
  document.getElementById('level-disp').textContent=`LEVEL ${level}`;
}

function updateHiScores(){
  document.getElementById('hiscore-list').innerHTML=
    Array.from({length:5},(_,i)=>`<div class="hiscore-row"><span class="hiscore-rank">#${i+1}</span><span class="hiscore-score">${hiScores[i]??'—'}</span></div>`).join('');
}

// ─── Draw ────────────────────────────────────────────────────
let tick_count=0;
function draw(){
  tick_count++;
  // flash overlay on hit
  if(flashTimer>0){
    ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
    ctx.fillStyle=flashColor;ctx.globalAlpha=flashTimer/8*0.35;
    ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;flashTimer--;
  } else {
    ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
  }

  // grid
  ctx.strokeStyle='#111120';ctx.lineWidth=0.5;
  for(let i=0;i<=GRID;i++){
    ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,H);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(W,i*CELL);ctx.stroke();
  }

  // hazards
  hazards.forEach(h=>{
    let ht=HAZARD_TYPES[h.type];
    // bg tile
    ctx.fillStyle=ht.bg;
    ctx.beginPath();ctx.roundRect(h.x*CELL+1,h.y*CELL+1,CELL-2,CELL-2,3);ctx.fill();
    // pulsing border for bombs
    if(ht.pulse){
      let pulse=0.5+0.5*Math.sin(tick_count*0.25);
      ctx.strokeStyle=ht.color;ctx.lineWidth=1+pulse;
      ctx.beginPath();ctx.roundRect(h.x*CELL+1,h.y*CELL+1,CELL-2,CELL-2,3);ctx.stroke();
    } else {
      ctx.strokeStyle=ht.color;ctx.lineWidth=1;
      ctx.beginPath();ctx.roundRect(h.x*CELL+1,h.y*CELL+1,CELL-2,CELL-2,3);ctx.stroke();
    }
    // emoji
    ctx.drawImage(getEmojiCanvas(ht.emoji),h.x*CELL,h.y*CELL);
  });

  // fruit
  ctx.drawImage(getEmojiCanvas(FRUITS[fruitIdx].e),fruit.x*CELL,fruit.y*CELL);
  // fruit glow ring
  let glow=0.5+0.5*Math.sin(tick_count*0.18);
  ctx.strokeStyle=`rgba(255,255,255,${0.15+glow*0.2})`;ctx.lineWidth=1;
  ctx.beginPath();ctx.roundRect(fruit.x*CELL,fruit.y*CELL,CELL,CELL,4);ctx.stroke();

  // snake
  snake.forEach((s,i)=>{
    let t=i/snake.length;
    let r=Math.round(46+t*(20-46)),g=Math.round(213+t*(180-213)),b=Math.round(115+t*(60-115));
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.beginPath();
    let px=s.x*CELL,py=s.y*CELL;
    if(i===0){ctx.roundRect(px+1,py+1,CELL-2,CELL-2,5);}
    else{ctx.roundRect(px+2,py+2,CELL-4,CELL-4,3);}
    ctx.fill();
    if(i===0){
      let ex=dir.x,ey=dir.y;
      ctx.fillStyle='#0a0a0f';
      ctx.beginPath();ctx.arc(px+CELL/2+ex*4+(-ey*3),py+CELL/2+ey*4+(ex*3),2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(px+CELL/2+ex*4+(ey*3),py+CELL/2+ey*4+(-ex*3),2,0,Math.PI*2);ctx.fill();
    }
  });

  drawParticles();
}

// ─── Game logic ──────────────────────────────────────────────
function initGame(){
  snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  fruitIdx=0;nextFruitIdx=1;
  score=0;streak=0;totalEaten=0;lives=3;level=1;
  particles=[];flashTimer=0;
  spawnHazards();
  placeFruit();
  updateUI();
}

function advanceLevel(){
  level++;
  spawnHazards();
  placeFruit();
  // brief green flash
  flashTimer=10;flashColor='#22c55e';
  document.getElementById('status').textContent=`level ${level}!`;
  setTimeout(()=>document.getElementById('status').textContent='',1200);
}

function loseLife(){
  lives--;
  spawnParticles(snake[0].x,snake[0].y,'#ef4444',12);
  flashTimer=8;flashColor='#ef4444';
  updateUI();
  if(lives<=0){ endGame(); return false; }
  // respawn snake short, keep score
  snake=[{x:8,y:8},{x:7,y:8},{x:6,y:8}];
  dir={x:1,y:0};nextDir={x:1,y:0};streak=0;
  return true;
}

function tick(){
  dir={x:nextDir.x,y:nextDir.y};
  let head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  // wall collision
  if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID){
    if(!loseLife()) return; else { updateParticles();draw();return; }
  }
  // self collision
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){
    if(!loseLife()) return; else { updateParticles();draw();return; }
  }
  // hazard collision
  let hitHazard=hazards.find(h=>h.x===head.x&&h.y===head.y);
  if(hitHazard){
    if(!loseLife()) return; else { updateParticles();draw();return; }
  }

  snake.unshift(head);

  if(head.x===fruit.x&&head.y===fruit.y){
    let bonus=1+Math.floor(streak/3)*0.5;
    score+=Math.floor(FRUITS[fruitIdx].pts*bonus);
    streak++;totalEaten++;
    if(streak>(bestStreak||0))bestStreak=streak;
    spawnParticles(head.x,head.y,'#fde047',10);
    fruitIdx=nextFruitIdx;
    nextFruitIdx=(nextFruitIdx+1)%FRUITS.length;
    placeFruit();
    // level up every 5 fruits
    if(totalEaten%5===0) advanceLevel();
    updateUI();
  } else {
    snake.pop();
  }

  updateParticles();
  draw();
}

function endGame(){
  running=false;clearInterval(loop);
  hiScores.push(score);
  hiScores.sort((a,b)=>b-a);
  hiScores=hiScores.slice(0,5);
  try{localStorage.setItem('snakeHiScores2',JSON.stringify(hiScores));}catch(e){}
  updateHiScores();
  document.getElementById('status').textContent=`game over — scored ${score}`;
  document.getElementById('start-btn').textContent='▶ PLAY AGAIN';
  document.getElementById('start-btn').style.display='block';
  // overlay
  ctx.fillStyle='rgba(10,10,15,0.78)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ef4444';ctx.font='bold 18px Space Mono,monospace';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('GAME OVER',W/2,H/2-22);
  ctx.fillStyle='#2dd4bf';ctx.font='13px Space Mono,monospace';
  ctx.fillText(`score: ${score}`,W/2,H/2+2);
  ctx.fillStyle='#64748b';ctx.font='11px Space Mono,monospace';
  ctx.fillText(`level ${level} · ${totalEaten} fruits`,W/2,H/2+22);
}

// ─── Controls ────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
  if((e.key==='ArrowUp'||e.key==='w')&&dir.y!==1)  nextDir={x:0,y:-1};
  if((e.key==='ArrowDown'||e.key==='s')&&dir.y!==-1)nextDir={x:0,y:1};
  if((e.key==='ArrowLeft'||e.key==='a')&&dir.x!==1) nextDir={x:-1,y:0};
  if((e.key==='ArrowRight'||e.key==='d')&&dir.x!==-1)nextDir={x:1,y:0};
});
let tx=null,ty=null;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  if(tx===null)return;
  let dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){if(dx>0&&dir.x!==-1)nextDir={x:1,y:0};else if(dx<0&&dir.x!==1)nextDir={x:-1,y:0};}
  else{if(dy>0&&dir.y!==-1)nextDir={x:0,y:1};else if(dy<0&&dir.y!==1)nextDir={x:0,y:-1};}
  tx=ty=null;
},{passive:true});

// ─── Start ───────────────────────────────────────────────────
document.getElementById('start-btn').addEventListener('click',()=>{
  if(running)return;
  running=true;
  initGame();draw();
  document.getElementById('status').textContent='arrow keys or WASD';
  document.getElementById('start-btn').style.display='none';
  let speed=180;
  function startLoop(){
    loop=setInterval(()=>{
      tick();
      let ns=Math.max(75,180-Math.floor(score/80)*8);
      if(ns!==speed){speed=ns;clearInterval(loop);if(running)startLoop();}
    },speed);
  }
  startLoop();
});

updateHiScores();
// idle screen
ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,W,H);
ctx.fillStyle='#2dd4bf';ctx.font='bold 14px Space Mono,monospace';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText('SNAKE',W/2,H/2-20);
ctx.fillStyle='#475569';ctx.font='11px Space Mono,monospace';
ctx.fillText('eat fruits · dodge hazards',W/2,H/2+2);
ctx.fillText('💣  🪤  🧱',W/2,H/2+22);
</script>
</body>
</html>
